<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="125 205 670 747" width="670" height="747">
  <style>
    /* Draw-on animation using stroke-dashoffset + pathLength normalization */
    .draw {
      fill: none;
      stroke: #000;
      stroke-width: 14;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .shape-outer {
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: drawStroke 2.2s cubic-bezier(0.37, 0, 0.63, 1) forwards;
    }

    .shape-inner {
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: drawStroke 1.2s cubic-bezier(0.37, 0, 0.63, 1) 0.3s forwards;
    }

    @keyframes drawStroke {
      to { stroke-dashoffset: 0; }
    }
  </style>

  <!-- Rotated 180° and flipped horizontally around the centre -->
  <g transform="rotate(180, 500, 500) scale(-1, 1) translate(-1000, 0)">
    <!-- Animated stroke drawing layer — no fill -->
    <path class="draw shape-outer" pathLength="1" d="M 676.970 676.855 C 579.388 774.437 420.613 774.439 323.030 676.856 C 312.127 665.954 302.514 654.254 294.048 641.995 L 197.681 641.995 L 197.681 724.133 C 197.681 738.504 186.029 750.156 171.657 750.156 C 157.287 750.156 145.634 738.504 145.634 724.133 L 145.634 94.293 C 145.634 79.919 157.287 68.270 171.657 68.270 C 186.029 68.270 197.681 79.919 197.681 94.293 L 197.681 589.949 L 266.574 589.949 C 232.183 500.423 250.957 394.987 323.030 322.915 C 420.611 225.333 579.387 225.334 676.969 322.916 C 774.552 420.499 774.552 579.273 676.970 676.855 Z" />
    <path class="draw shape-inner" pathLength="1" d="M 359.832 640.054 C 437.120 717.341 562.879 717.342 640.168 640.053 C 717.455 562.767 717.455 437.006 640.167 359.719" />
  </g>
</svg>
